name: rozana_attendance_kiosk
description: Rozana Resorts fingerprint attendance kiosk for Android tablets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^6.1.4
  crypto: ^3.0.6
  equatable: ^2.0.7
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  supabase_flutter: ^2.9.0
  uuid: ^4.5.1
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.4+4

flutter:
  uses-material-design: true
  assets:
    - .env
